<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在登录...</title>
  <style>
    body {
      font-family: "Noto Sans SC", -apple-system, sans-serif;
      background: #f7f8fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: #202124;
    }
    .card {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      text-align: center;
    }
    .loader {
      width: 32px; height: 32px;
      border: 3px solid #e8eaed;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="loader"></div>
    <p>正在验证登录...</p>
  </div>
  <script>
    // 从 URL hash 中提取 access_token
    // Supabase 回调格式: /callback#access_token=xxx&refresh_token=yyy&...
    const hash = window.location.hash.substring(1)
    const params = new URLSearchParams(hash)
    const accessToken = params.get('access_token')
    const refreshToken = params.get('refresh_token')
    const type = params.get('type') // 'signup', 'recovery', etc.

    if (accessToken) {
      // 解析 JWT 获取过期时间（payload 是 base64 编码的 JSON）
      try {
        const payload = JSON.parse(atob(accessToken.split('.')[1]))
        const maxAge = payload.exp - Math.floor(Date.now() / 1000)

        // 保存到 cookie
        const setCookie = (name, value, age) => {
          document.cookie = `${encodeURIComponent(name)}=${encodeURIComponent(value)}; path=/; max-age=${age}; SameSite=Lax; Secure`
        }
        setCookie('sb-access-token', accessToken, maxAge)
        if (refreshToken) setCookie('sb-refresh-token', refreshToken, maxAge)

        // 跳转到首页
        window.location.href = '/'
      } catch (e) {
        document.body.innerHTML = '<div class="card"><p style="color:#c5221f">登录验证失败，请重试</p><a href="/login" style="color:#1a73e8">返回登录页</a></div>'
      }
    } else {
      document.body.innerHTML = '<div class="card"><p style="color:#c5221f">未找到登录信息</p><a href="/login" style="color:#1a73e8">返回登录页</a></div>'
    }
  </script>
</body>
</html>
